name: Scanner CI

on:
  push:
  pull_request:

jobs:
  backend-and-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run backend tests
        run: pytest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start Juice Shop
        run: docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop:latest

      - name: Wait for Juice Shop
        run: |
          python - <<'PY'
          import time
          import urllib.request
          for _ in range(60):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:3000", timeout=3) as response:
                      print(response.status)
                      raise SystemExit(0)
              except Exception:
                  time.sleep(2)
          raise SystemExit("Juice Shop did not become ready in time.")
          PY

      - name: Scanner smoke run
        run: python scripts/run_scanner.py http://127.0.0.1:3000
